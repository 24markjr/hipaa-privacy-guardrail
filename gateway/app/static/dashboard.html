<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Privacy Gateway — Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { --bg:#0b1220; --card:#131c2e; --line:#223049; --txt:#e6edf6; --muted:#8aa0bd; --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:20px 28px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; font-weight:700; }
  header .grow { flex:1; }
  input { background:#0c1424; border:1px solid var(--line); color:var(--txt); padding:8px 10px; border-radius:8px; }
  button { background:var(--accent); border:0; color:#04121f; font-weight:700; padding:8px 14px; border-radius:8px; cursor:pointer; }
  main { padding:24px 28px; max-width:1200px; margin:0 auto; }
  .grid { display:grid; gap:16px; }
  .kpis { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; }
  .kpi .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .kpi .value { font-size:30px; font-weight:800; margin-top:6px; }
  .charts { grid-template-columns:1fr 1fr; }
  .latency { grid-template-columns:repeat(4,1fr); }
  h2 { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:0 0 12px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { color:var(--muted); font-weight:600; }
  .pill { padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; }
  .ok { background:#0f2e1f; color:#4ade80; } .blk { background:#3a1620; color:#fb7185; }
  .muted { color:var(--muted); }
  @media(max-width:820px){ .charts{grid-template-columns:1fr;} .latency{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>
<header>
  <h1>🛡️ AI Privacy &amp; Compliance Gateway</h1>
  <span class="muted" id="status">enter API key →</span>
  <span class="grow"></span>
  <input id="apikey" placeholder="X-API-Key" size="22" />
  <button onclick="save()">Connect</button>
  <button onclick="load()">Refresh</button>
</header>
<main>
  <div class="grid kpis" id="kpis"></div>

  <div class="grid latency" id="latency" style="margin-bottom:20px"></div>

  <div class="grid charts" style="margin-bottom:20px">
    <div class="card"><h2>Most common entities</h2><canvas id="entityChart" height="200"></canvas></div>
    <div class="card"><h2>Provider usage</h2><canvas id="providerChart" height="200"></canvas></div>
  </div>

  <div class="card">
    <h2>Recent requests</h2>
    <div style="overflow:auto"><table id="auditTable">
      <thead><tr><th>Time</th><th>Endpoint</th><th>Provider</th><th>PII</th><th>Injection</th><th>Status</th><th>ms</th></tr></thead>
      <tbody></tbody>
    </table></div>
  </div>
</main>

<script>
let entityChart, providerChart;
const $ = (id) => document.getElementById(id);

function save(){ localStorage.setItem("gw_key", $("apikey").value.trim()); load(); }

function headers(){ return { "X-API-Key": localStorage.getItem("gw_key") || "" }; }

function kpi(label, value){ return `<div class="card kpi"><div class="label">${label}</div><div class="value">${value}</div></div>`; }

async function load(){
  const key = localStorage.getItem("gw_key");
  if(!key){ $("status").textContent = "no API key set"; return; }
  $("apikey").value = key;
  try {
    const [stats, audit] = await Promise.all([
      fetch("/v1/admin/stats", {headers:headers()}).then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); }),
      fetch("/v1/admin/audit?limit=50", {headers:headers()}).then(r=>r.json()),
    ]);
    $("status").textContent = "connected ✓";
    renderKpis(stats); renderLatency(stats); renderCharts(stats); renderAudit(audit);
  } catch(e){ $("status").textContent = "error: " + e.message + " (check API key)"; }
}

function renderKpis(s){
  $("kpis").innerHTML = [
    kpi("Requests", s.total_requests),
    kpi("PII Found", s.pii_found),
    kpi("Injection Attempts", s.injection_attempts),
    kpi("Blocked", s.blocked),
    kpi("Tokens", s.token_usage),
    kpi("Est. Cost ($)", s.estimated_cost),
  ].join("");
}

function renderLatency(s){
  const l = s.latency_ms || {};
  $("latency").innerHTML = [
    kpi("Avg ms", l.avg ?? 0), kpi("P50 ms", l.p50 ?? 0),
    kpi("P95 ms", l.p95 ?? 0), kpi("P99 ms", l.p99 ?? 0),
  ].join("");
}

function renderCharts(s){
  const ents = s.entity_types || {}, provs = s.provider_usage || {};
  const palette = ["#38bdf8","#818cf8","#fb7185","#4ade80","#fbbf24","#22d3ee","#c084fc","#f472b6"];
  entityChart?.destroy(); providerChart?.destroy();
  entityChart = new Chart($("entityChart"), {
    type:"bar",
    data:{ labels:Object.keys(ents), datasets:[{ data:Object.values(ents), backgroundColor:"#38bdf8" }] },
    options:{ plugins:{legend:{display:false}}, scales:{x:{ticks:{color:"#8aa0bd"}},y:{ticks:{color:"#8aa0bd"}}} }
  });
  providerChart = new Chart($("providerChart"), {
    type:"doughnut",
    data:{ labels:Object.keys(provs), datasets:[{ data:Object.values(provs), backgroundColor:palette }] },
    options:{ plugins:{legend:{labels:{color:"#e6edf6"}}} }
  });
}

function renderAudit(a){
  const rows = (a.records||[]).map(r=>`<tr>
    <td class="muted">${(r.timestamp||"").replace("T"," ").slice(0,19)}</td>
    <td>${r.endpoint||""}</td><td>${r.provider||""}</td>
    <td>${r.pii_count||0}</td>
    <td>${r.injection_flag ? "⚠️" : "—"}</td>
    <td><span class="pill ${r.blocked?"blk":"ok"}">${r.blocked?"blocked":"ok"}</span></td>
    <td>${(r.processing_time_ms||0).toFixed ? r.processing_time_ms.toFixed(1) : r.processing_time_ms}</td>
  </tr>`).join("");
  $("auditTable").querySelector("tbody").innerHTML = rows || `<tr><td colspan="7" class="muted">no records yet</td></tr>`;
}

if(localStorage.getItem("gw_key")) load();
</script>
</body>
</html>
